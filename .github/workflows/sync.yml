name: Upstream Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPSTREAM_SYNC_REPO: wukongdaily/ImmortalWrt-ImageBuilder
  UPSTREAM_SYNC_BRANCH: master
  TARGET_SYNC_BRANCH: master

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 0 * * *" # every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TARGET_SYNC_BRANCH }}
          fetch-depth: 0

      # Step 2: run the sync action
      - name: Add upstream remote
        run: |
          git remote add upstream "https://github.com/${{ env.UPSTREAM_SYNC_REPO }}.git" || git remote set-url upstream "https://github.com/${{ env.UPSTREAM_SYNC_REPO }}.git"

      - name: Fetch upstream latest code
        run: |
          git fetch upstream --tags --force
          echo "=== 上游分支 ==="
          git branch -r

      - name: Check current branch status
        run: |
          echo "=== 当前分支信息 ==="
          git branch -vv
          echo ""
          echo "=== 本地 ${{ env.TARGET_SYNC_BRANCH }} 最新提交 ==="
          git log -3 --oneline
          echo ""
          echo "=== 上游/${{ env.UPSTREAM_SYNC_BRANCH }} 最新提交 ==="
          git log -3 upstream/${{ env.UPSTREAM_SYNC_BRANCH }} --oneline

      - name: Sync upstream changes using git reset
        run: |
          git checkout ${{ env.TARGET_SYNC_BRANCH }}
          git reset --hard upstream/${{ env.UPSTREAM_SYNC_BRANCH }}
          git push --force-with-lease origin ${{ env.TARGET_SYNC_BRANCH }}
          echo "=== 重置完成 ==="

      - name: Verify sync completion
        run: |
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/${{ env.UPSTREAM_SYNC_BRANCH }})
          echo "本地提交:  $LOCAL_COMMIT"
          echo "上游提交: $UPSTREAM_COMMIT"
          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "✓ 本地分支已与上游分支同步"
            echo "=== 验证文件内容 ==="
            git diff --stat upstream/${{ env.UPSTREAM_SYNC_BRANCH }} HEAD
          else
            echo "✗ 同步验证失败"
            exit 1
          fi

      - name: 同步检查
        if: failure()
        run: |
          echo "[错误] 同步失败，请检查以下可能的原因："
          echo "1. 上游仓库的 workflow 文件发生变更"
          echo "2. 分支保护规则阻止了强制推送"
          echo "请手动 Sync Fork 一次，或检查仓库设置中的分支保护规则。"
          exit 1

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 1
